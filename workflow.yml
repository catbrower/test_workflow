apiVersion: v1
kind: ConfigMap
metadata:
  name: test-workflow-{{DEPLOYMENT_ID}}
  namespace: swarmopt
  
apiVersion: batch/v1
kind: Job
metadata:
  name: test-workflow-{{DEPLOYMENT_ID}}
  namespace: swarmopt
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: flow-function
          image: flow-function-runner:latest
          env:
            - name: WORK_ITEM
              value: "{{WORK_ITEM}}"
            - name: REDIS_HOST
              value: redis.swarmopt.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
